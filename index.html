<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trading Library</title>
<style>
:root{
  --bg:#111218;--gold:#d4a843;--gold2:#8a6a25;--gold3:#f0c840;
  --txt:#e8dfc8;--muted:#7a7060;
  --surf:#0d0e14;--surf2:#16181f;--bdr:#2a2535;--red:#c04040;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;overflow-x:hidden}

header{background:var(--surf);border-bottom:1px solid var(--bdr);padding:0 28px;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.logo{font-size:13px;font-weight:700;letter-spacing:4px;color:var(--gold);text-transform:uppercase;white-space:nowrap;display:flex;align-items:center;gap:10px}
.logo em{color:var(--muted);font-size:10px;font-style:normal;letter-spacing:1.5px;font-weight:400}
.hdr-r{display:flex;align-items:center;gap:12px}
.sbox{position:relative}
.sbox input{background:var(--surf2);border:1px solid var(--bdr);color:var(--txt);padding:8px 14px 8px 34px;border-radius:8px;font-size:12px;width:200px;font-family:inherit;outline:none;transition:border-color .15s}
.sbox input:focus{border-color:var(--gold2)}
.sbox input::placeholder{color:var(--muted)}
.sbox i{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:13px;pointer-events:none}
.addbtn{background:var(--gold);color:#0a0800;border:none;padding:9px 22px;border-radius:8px;font-size:12px;font-family:inherit;font-weight:700;cursor:pointer;transition:all .15s;letter-spacing:.5px}
.addbtn:hover{background:var(--gold3)}

.filters{background:var(--surf);border-bottom:1px solid var(--bdr);padding:0 28px;display:flex;align-items:center;gap:6px;height:46px;overflow-x:auto;scrollbar-width:none}
.filters::-webkit-scrollbar{display:none}
.fl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;white-space:nowrap;margin-right:4px}
.pill{background:none;color:var(--muted);border:1px solid var(--bdr);padding:5px 14px;border-radius:20px;font-size:11px;cursor:pointer;white-space:nowrap;font-family:inherit;transition:all .15s}
.pill:hover{color:var(--txt);border-color:rgba(212,168,67,.4);background:rgba(212,168,67,.06)}
.pill.on{background:rgba(212,168,67,.15);color:var(--gold);border-color:rgba(212,168,67,.5);font-weight:600}

.stats{padding:10px 28px;font-size:11px;color:var(--muted);display:flex;justify-content:space-between;align-items:center;letter-spacing:.3px}
.stats strong{color:var(--gold);font-weight:600}

.shwrap{padding:0 20px 80px}
.catsec{margin-bottom:24px}
.cattitle{font-size:10px;text-transform:uppercase;letter-spacing:2.5px;color:var(--gold2);padding:18px 4px 10px;display:flex;align-items:center;gap:10px}
.catcnt{background:rgba(212,168,67,.14);color:var(--gold);font-size:9px;padding:2px 9px;border-radius:10px;font-weight:700}

.shelf{
  background:#2a1400;border-radius:4px;padding:28px 24px 0;
  display:flex;flex-wrap:wrap;align-items:flex-end;gap:10px;
  min-height:220px;position:relative;overflow:hidden;
}
.shelf::after{
  content:'';position:absolute;left:0;right:0;bottom:0;height:26px;
  background:linear-gradient(180deg,#9a5825 0%,#b06830 20%,#8a4c1c 40%,#9a5825 60%,#7a3c14 80%,#9a5825 100%);
  box-shadow:0 6px 16px rgba(0,0,0,.7),inset 0 2px 0 rgba(255,210,120,.2),inset 0 -2px 0 rgba(0,0,0,.5);
  border-radius:0 0 4px 4px;
}
.shelf::before{content:'';position:absolute;left:0;right:0;bottom:26px;height:2px;background:linear-gradient(90deg,transparent,rgba(255,200,80,.4) 20%,rgba(255,230,140,.65) 50%,rgba(255,200,80,.4) 80%,transparent);z-index:1}

.book{width:120px;height:168px;cursor:pointer;position:relative;transition:transform .2s cubic-bezier(.34,1.4,.64,1);transform-origin:bottom center;flex-shrink:0;margin-bottom:26px}
.book:hover{transform:translateY(-20px) scale(1.04);z-index:5}
.binner{width:100%;height:100%;border-radius:2px 4px 4px 2px;overflow:hidden;box-shadow:-4px 6px 16px rgba(0,0,0,.75),2px 0 0 rgba(255,255,255,.06),inset -5px 0 10px rgba(0,0,0,.25);position:relative}
.bimg{width:100%;height:100%;object-fit:cover;display:block}
.bfall{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:12px 10px;position:relative}
.bfall::before{content:'';position:absolute;left:0;top:0;bottom:0;width:8px;background:rgba(0,0,0,.4)}
.bfall-t{font-size:9px;font-weight:700;text-align:center;color:rgba(255,255,255,.95);line-height:1.35;text-shadow:0 1px 4px rgba(0,0,0,.8);padding:0 6px;word-break:break-word}
.binner::after{content:'';position:absolute;right:0;top:0;bottom:0;width:2px;background:rgba(255,255,255,.08)}
.delbtn{position:absolute;top:-6px;right:-6px;width:18px;height:18px;background:var(--red);border-radius:50%;color:#fff;font-size:9px;display:flex;align-items:center;justify-content:center;opacity:0;cursor:pointer;z-index:10;transition:opacity .15s;border:none;font-family:inherit}
.book:hover .delbtn{opacity:1}
.tip{position:absolute;bottom:calc(100% + 10px);left:50%;transform:translateX(-50%);background:#0d0e14;border:1px solid rgba(212,168,67,.2);border-radius:8px;padding:11px 13px;width:168px;font-size:11px;z-index:60;pointer-events:none;opacity:0;transition:opacity .18s;box-shadow:0 8px 24px rgba(0,0,0,.8)}
.book:hover .tip{opacity:1}
.tip strong{font-size:12px;color:var(--txt);display:block;margin-bottom:6px;line-height:1.4;font-weight:600}
.tipc{background:rgba(212,168,67,.12);color:var(--gold);font-size:9px;padding:2px 8px;border-radius:4px;display:inline-block;margin-bottom:5px;text-transform:uppercase;letter-spacing:.8px;font-weight:600}
.tiph{margin-top:6px;color:var(--gold2);font-size:10px;border-top:1px solid rgba(255,255,255,.06);padding-top:6px}

.empty{text-align:center;padding:6rem 2rem;color:var(--muted)}
.empty h3{font-size:16px;margin:14px 0 8px;color:var(--txt);font-weight:600}
.empty p{font-size:13px;line-height:1.8}

/* MODAL */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.82);display:flex;align-items:center;justify-content:center;z-index:200;backdrop-filter:blur(6px)}
.ov.h{display:none}
.modal{background:#13141c;border:1px solid rgba(212,168,67,.2);border-radius:14px;padding:28px;width:500px;max-width:95vw;position:relative;box-shadow:0 24px 60px rgba(0,0,0,.7)}
.modal h2{font-size:16px;color:var(--txt);margin-bottom:16px;font-weight:700}
.mx{position:absolute;top:16px;right:18px;background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer;line-height:1}
.mx:hover{color:var(--txt)}
.mo-tabs{display:flex;gap:6px;margin-bottom:16px;border-bottom:1px solid var(--bdr);padding-bottom:12px}
.mo-tab{background:none;border:1px solid var(--bdr);color:var(--muted);padding:7px 16px;border-radius:8px;font-size:12px;cursor:pointer;font-family:inherit;transition:all .15s}
.mo-tab:hover{color:var(--txt);border-color:rgba(212,168,67,.3)}
.mo-tab.on{background:rgba(212,168,67,.12);color:var(--gold);border-color:rgba(212,168,67,.4);font-weight:600}
.fg{margin-bottom:12px}
.fg label{display:block;font-size:10px;color:var(--muted);margin-bottom:5px;text-transform:uppercase;letter-spacing:1px;font-weight:600}
.fg input,.fg select{width:100%;background:#1a1b24;border:1px solid var(--bdr);color:var(--txt);padding:9px 12px;border-radius:8px;font-size:13px;font-family:inherit;outline:none;transition:border-color .15s}
.fg input:focus,.fg select:focus{border-color:rgba(212,168,67,.5)}
.fg select option{background:#1a1b24}
.dz{border:1.5px dashed var(--bdr);border-radius:10px;padding:28px 20px;text-align:center;cursor:pointer;transition:all .2s;color:var(--muted);font-size:13px}
.dz:hover,.dz.ov2{border-color:rgba(212,168,67,.5);color:var(--txt);background:rgba(212,168,67,.04)}
.dz p{margin-top:5px;font-size:11px}
.mfoot{display:flex;gap:10px;margin-top:20px;justify-content:flex-end}
.btnc{background:none;border:1px solid var(--bdr);color:var(--muted);padding:9px 20px;border-radius:8px;font-size:12px;cursor:pointer;font-family:inherit;transition:all .15s}
.btnc:hover{color:var(--txt);border-color:var(--muted)}
.btnok{background:var(--gold);color:#0a0800;border:none;padding:9px 22px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .15s}
.btnok:hover{background:var(--gold3)}
.btnok:disabled{opacity:.35;cursor:not-allowed}
.batch-item{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:6px;background:rgba(255,255,255,.03);margin-bottom:4px;font-size:11px}
.batch-item .bi-name{flex:1;color:var(--txt);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.batch-item .bi-status{color:var(--muted);font-size:10px;min-width:80px;text-align:right}
.batch-item.done .bi-status{color:#4caf88}
.batch-item.err .bi-status{color:var(--red)}
.batch-item.loading .bi-status{color:var(--gold)}

/* READER */
.rdr{position:fixed;inset:0;background:#0a0602;z-index:300;display:flex;flex-direction:column;overflow:hidden}
.rdr.h{display:none}
.rhdr{background:#080401;border-bottom:1px solid #201005;padding:0 14px;height:52px;display:flex;align-items:center;gap:8px;flex-shrink:0}
.rtitle{font-size:12px;color:#ddd0b8;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0}
.rnav{display:flex;align-items:center;gap:6px;flex-shrink:0}
.rnav button{background:#180e04;border:1px solid #3a2510;color:#c9a850;padding:5px 12px;border-radius:5px;font-size:12px;cursor:pointer;font-family:inherit;transition:background .15s;user-select:none;white-space:nowrap}
.rnav button:hover:not(:disabled){background:#261808;border-color:var(--gold)}
.rnav button:disabled{opacity:.3;cursor:not-allowed}
.pinfo{font-size:11px;color:#6a5535;min-width:70px;text-align:center;white-space:nowrap}
.pbar{width:100px;background:#180e04;border-radius:3px;height:3px;cursor:pointer;flex-shrink:0}
.pfill{background:var(--gold);height:100%;border-radius:3px;transition:width .2s}
.zrow{display:flex;align-items:center;gap:3px;flex-shrink:0}
.zrow button{background:#180e04;border:1px solid #3a2510;color:#c9a850;width:26px;height:26px;border-radius:5px;font-size:15px;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;line-height:1}
.zrow button:hover{background:#261808;border-color:var(--gold)}
.zpct{font-size:10px;color:#6a5535;min-width:36px;text-align:center}
.rx{background:none;border:none;color:#888;font-size:22px;cursor:pointer;padding:0 0 0 4px;flex-shrink:0;line-height:1}
.rx:hover{color:#fff}
.rbody{flex:1;overflow:auto;display:flex;align-items:flex-start;justify-content:center;background:radial-gradient(ellipse,#1a0f07 0%,#070402 100%);padding:16px}
.spread{display:inline-flex;align-items:flex-start;box-shadow:0 16px 50px rgba(0,0,0,.85);flex-shrink:0}
.pl,.pr{overflow:hidden;background:#fff;flex-shrink:0;position:relative}
.pl{border-radius:3px 0 0 3px;box-shadow:inset -8px 0 16px rgba(0,0,0,.1)}
.pr{border-radius:0 3px 3px 0;box-shadow:inset 8px 0 16px rgba(0,0,0,.08)}
.pl canvas,.pr canvas{display:block}
.spine{width:8px;background:linear-gradient(90deg,rgba(0,0,0,.18),rgba(0,0,0,.05),rgba(0,0,0,.18));flex-shrink:0;align-self:stretch}
.rload{color:#6a5535;font-size:14px;text-align:center;padding:4rem}

.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(8px);background:#13141c;border:1px solid rgba(212,168,67,.3);color:var(--txt);padding:11px 24px;border-radius:10px;font-size:12px;font-weight:500;z-index:999;opacity:0;transition:opacity .25s,transform .25s;pointer-events:none;white-space:nowrap;box-shadow:0 8px 24px rgba(0,0,0,.6)}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
#coverPreview{image-rendering:auto}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--surf)}
::-webkit-scrollbar-thumb{background:var(--bdr);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--gold2)}
</style>
</head>

const sbHeaders={'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json'};

async function sbSelect(query=''){
  const r=await fetch(`${SB_URL}/rest/v1/books?order=added_at.desc${query}`,{headers:sbHeaders});
  if(!r.ok)throw new Error(await r.text());
  return r.json();
}
async function sbInsert(row){
  const r=await fetch(`${SB_URL}/rest/v1/books`,{method:'POST',headers:{...sbHeaders,'Prefer':'return=minimal'},body:JSON.stringify(row)});
  if(!r.ok)throw new Error(await r.text());
}
async function sbDelete(id){
  const r=await fetch(`${SB_URL}/rest/v1/books?id=eq.${id}`,{method:'DELETE',headers:sbHeaders});
  if(!r.ok)throw new Error(await r.text());
}
async function sbUploadPdf(path,arrayBuf){
  const r=await fetch(`${SB_URL}/storage/v1/object/${BUCKET}/${path}`,{
    method:'POST',
    headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/pdf','x-upsert':'true'},
    body:arrayBuf
  });
  if(!r.ok)throw new Error(await r.text());
}
async function sbDeleteFile(path){
  await fetch(`${SB_URL}/storage/v1/object/${BUCKET}/${path}`,{method:'DELETE',headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY}});
}
function pdfPublicUrl(path){
  return `${SB_URL}/storage/v1/object/public/${BUCKET}/${path}`;
}

// ── CATS ────────────────────────────────────────────────
const CATS={
  'price-action':{l:'Price Action',g:['#18083c','#38168a']},
  'technical':{l:'Kỹ thuật',g:['#061c0b','#145a2c']},
  'volume':{l:'Volume',g:['#041428','#0e3278']},
  'forex':{l:'Forex',g:['#2a1002','#782c06']},
  'psychology':{l:'Tâm lý',g:['#1c0420','#640e58']},
  'strategy':{l:'Chiến lược',g:['#1a1000','#5a4400']},
  'other':{l:'Khác',g:['#121212','#363636']}
};

let books=[], filterCat='all', qry='';
let pdfDoc=null, curSpread=1, totalPg=0, zoom=1.0, busy=false;
let pendingFiles=[];

function $(id){return document.getElementById(id)}
function toast(m){const t=$('toast');t.textContent=m;t.classList.add('on');setTimeout(()=>t.classList.remove('on'),3000)}

// ── COVER EXTRACT ───────────────────────────────────────
async function extractCover(arrayBuf, pageNum=1){
  try{
    const pdf=await pdfjsLib.getDocument({data:arrayBuf.slice(0)}).promise;
    const pgNum=Math.min(pageNum, pdf.numPages);
    const pg=await pdf.getPage(pgNum);
    const vp=pg.getViewport({scale:1.2});
    const cv=document.createElement('canvas');cv.width=vp.width;cv.height=vp.height;
    await pg.render({canvasContext:cv.getContext('2d'),viewport:vp}).promise;
    return cv.toDataURL('image/jpeg',0.88);
  }catch{return null}
}

// ── RENDER ──────────────────────────────────────────────
function render(){
  const wrap=$('shwrap');
  const filtered=books.filter(b=>(filterCat==='all'||b.cat===filterCat)&&(!qry||b.title.toLowerCase().includes(qry.toLowerCase())));
  $('stat').innerHTML=`<strong>${filtered.length}</strong> quyển${filterCat!=='all'?' · '+(CATS[filterCat]?.l||filterCat):''}${qry?` · "<strong>${qry}</strong>"`:''}`; 
  if(!filtered.length){
    wrap.innerHTML=`<div class="empty"><div style="font-size:52px;opacity:.22">📚</div><h3>${books.length?'Không tìm thấy':'Chưa có sách nào'}</h3><p>${books.length?'Thử từ khóa khác hoặc đổi danh mục':'Nhấn <strong>+ Thêm sách</strong> để upload PDF lên cloud'}</p></div>`;
    return;
  }
  const order=['price-action','technical','volume','forex','psychology','strategy','other'];
  const grp={};
  filtered.forEach(b=>{const c=b.cat||'other';(grp[c]=grp[c]||[]).push(b)});
  const show=filterCat==='all'?order.filter(c=>grp[c]):[filterCat].filter(c=>grp[c]);
  wrap.innerHTML=show.map(c=>{
    const ci=CATS[c]||{l:c,g:['#222','#444']};
    return `<div class="catsec">
      <div class="cattitle">${ci.l}<span class="catcnt">${grp[c].length}</span></div>
      <div class="shelf">
        ${grp[c].map(b=>{
          const short=b.title.length>26?b.title.slice(0,24)+'…':b.title;
          const sz=b.size?(b.size/1048576).toFixed(1)+' MB':'';
          const inner=b.cover
            ?`<img class="bimg" src="${b.cover}" alt="" loading="lazy">`
            :`<div class="bfall" style="background:linear-gradient(155deg,${ci.g[0]},${ci.g[1]})"><div class="bfall-t">${short}</div></div>`;
          return `<div class="book" data-id="${b.id}" data-path="${b.pdf_path||''}">
            <div class="binner">${inner}</div>
            <button class="delbtn" data-id="${b.id}" data-path="${b.pdf_path||''}" title="Xóa">✕</button>
            <div class="tip"><strong>${b.title}</strong><div class="tipc">${ci.l}</div>${sz?`<div style="font-size:10px;color:var(--muted)">${sz}</div>`:''}<div class="tiph">Click để đọc →</div></div>
          </div>`;
        }).join('')}
      </div>
    </div>`;
  }).join('');
  wrap.querySelectorAll('.book').forEach(el=>{
    el.addEventListener('click',e=>{if(!e.target.closest('.delbtn'))openBook(el.dataset.id,el.dataset.path)});
  });
  wrap.querySelectorAll('.delbtn').forEach(el=>{
    el.addEventListener('click',async e=>{
      e.stopPropagation();
      if(!confirm('Xóa sách này khỏi cloud?'))return;
      try{
        await sbDelete(el.dataset.id);
        if(el.dataset.path)await sbDeleteFile(el.dataset.path);
        books=books.filter(b=>b.id!==el.dataset.id);
        render();toast('Đã xóa sách');
      }catch(err){toast('Lỗi xóa: '+err.message)}
    });
  });
}

// ── LOAD FROM SUPABASE ──────────────────────────────────
async function loadBooks(){
  try{
    books=await sbSelect();
    render();
  }catch(err){
    $('shwrap').innerHTML=`<div class="empty"><h3>Lỗi kết nối Supabase</h3><p>${err.message}</p></div>`;
  }
}

// ── UPLOAD ──────────────────────────────────────────────
function openModal(){$('moWrap').classList.remove('h');$('fselName').innerHTML='';$('batchList').innerHTML='';$('btnSave').disabled=true;pendingFiles=[]}
function closeModal(){$('moWrap').classList.add('h');pendingFiles=[];coverPdf=null;$('coverPicker').style.display='none';}
$('btnAdd').onclick=openModal;
$('moClose').onclick=$('moCancel').onclick=closeModal;
$('moWrap').onclick=e=>{if(e.target===$('moWrap'))closeModal()};

let coverPdf=null, coverPageCur=1, coverPageMax=1;

async function showCoverPage(n){
  if(!coverPdf)return;
  n=Math.max(1,Math.min(coverPageMax,n));
  coverPageCur=n;
  $('coverPageNum').textContent=n;
  const pg=await coverPdf.getPage(n);
  const canvas=$('coverPreview');
  const vp=pg.getViewport({scale:1.4});
  canvas.width=vp.width; canvas.height=vp.height;
  canvas.style.height='120px';
  canvas.style.width=(vp.width/vp.height*120)+'px';
  await pg.render({canvasContext:canvas.getContext('2d'),viewport:vp}).promise;
}

function pickFiles(files){
  const pdfs=[...files].filter(f=>f.type==='application/pdf');
  if(!pdfs.length){toast('Chỉ hỗ trợ file PDF');return}
  pendingFiles=pdfs;
  $('fselName').innerHTML=pdfs.length===1?'✓ '+pdfs[0].name:'✓ '+pdfs.length+' file được chọn';
  renderBatchList();
  $('btnSave').disabled=false;
  // Show cover picker for single file
  if(pdfs.length===1){
    $('coverPicker').style.display='block';
    pdfs[0].arrayBuffer().then(buf=>{
      pdfjsLib.getDocument({data:buf}).promise.then(pdf=>{
        coverPdf=pdf; coverPageCur=1; coverPageMax=pdf.numPages;
        $('coverPageTotal').textContent=pdf.numPages;
        showCoverPage(1);
      });
    });
  } else {
    $('coverPicker').style.display='none';
    coverPdf=null;
  }
}
function renderBatchList(){
  if(pendingFiles.length<=1){$('batchList').innerHTML='';return}
  $('batchList').innerHTML='<div style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px">'+pendingFiles.length+' file:</div>'
    +pendingFiles.map((f,i)=>`<div class="batch-item" id="bi${i}"><span>📄</span><span class="bi-name">${f.name.replace(/\.pdf$/i,'')}</span><span class="bi-status">chờ...</span></div>`).join('');
}
const dz=$('dz');
dz.onclick=()=>{const inp=document.createElement('input');inp.type='file';inp.accept='.pdf';inp.multiple=true;inp.onchange=e=>pickFiles(e.target.files);inp.click()};
dz.ondragover=e=>{e.preventDefault();dz.classList.add('ov2')};
dz.ondragleave=()=>dz.classList.remove('ov2');
dz.ondrop=e=>{e.preventDefault();dz.classList.remove('ov2');pickFiles(e.dataTransfer.files)};
$('coverPrev').onclick=()=>showCoverPage(coverPageCur-1);
$('coverNext').onclick=()=>showCoverPage(coverPageCur+1);

$('btnSave').onclick=async()=>{
  if(!pendingFiles.length)return;
  const cat=$('inCat').value;
  const btn=$('btnSave');btn.disabled=true;
  let ok=0;
  for(let i=0;i<pendingFiles.length;i++){
    const f=pendingFiles[i];
    const biEl=document.getElementById('bi'+i);
    if(biEl){biEl.classList.add('loading');biEl.querySelector('.bi-status').textContent='đang upload...'}
    btn.textContent=`Uploading ${i+1}/${pendingFiles.length}...`;
    try{
      const arrayBuf=await f.arrayBuffer();
      // Use selected cover page (from picker for single, page 1 for batch)
      const coverPageNum=(pendingFiles.length===1 && coverPdf) ? coverPageCur : 1;
      const cover=await extractCover(arrayBuf, coverPageNum);
      const id='b'+Date.now()+'x'+i;
      const path=id+'/'+f.name.replace(/[^a-zA-Z0-9._-]/g,'_');
      await sbUploadPdf(path,arrayBuf);
      const row={id,title:f.name.replace(/\.pdf$/i,'').replace(/[_-]/g,' ').trim(),cat,size:f.size,cover,pdf_path:path,added_at:new Date().toISOString()};
      await sbInsert(row);
      books.unshift(row);render();
      if(biEl){biEl.classList.remove('loading');biEl.classList.add('done');biEl.querySelector('.bi-status').textContent='✓ xong'}
      ok++;
    }catch(err){
      if(biEl){biEl.classList.remove('loading');biEl.classList.add('err');biEl.querySelector('.bi-status').textContent='lỗi: '+err.message.slice(0,20)}
      console.error(err);
    }
  }
  closeModal();
  toast('✓ Đã upload '+ok+'/'+pendingFiles.length+' sách lên cloud');
  btn.textContent='Upload lên cloud';btn.disabled=false;
};

// ── READER ──────────────────────────────────────────────
function calcScale(){
  const body=$('rbody');
  const availH=body.clientHeight-32;
  const availW=body.clientWidth-48;
  return Math.max(0.2,Math.min(availH/841,(availW-8)/(595*2))*zoom);
}
async function drawPage(num,canvas){
  const sc=calcScale();
  if(!pdfDoc||num<1||num>totalPg){
    canvas.width=Math.round(595*sc);canvas.height=Math.round(841*sc);
    const ctx=canvas.getContext('2d');ctx.fillStyle='#f6f2ec';ctx.fillRect(0,0,canvas.width,canvas.height);
    return;
  }
  const pg=await pdfDoc.getPage(num);
  const vp=pg.getViewport({scale:sc});
  canvas.width=vp.width;canvas.height=vp.height;
  await pg.render({canvasContext:canvas.getContext('2d'),viewport:vp}).promise;
}
async function showSpread(s){
  curSpread=Math.max(1,Math.min(totalPg,s));
  const cvL=$('cvL'),cvR=$('cvR');
  const right=curSpread+1<=totalPg?curSpread+1:0;
  await Promise.all([drawPage(curSpread,cvL),drawPage(right,cvR)]);
  $('pageL').style.cssText=`width:${cvL.width}px;height:${cvL.height}px`;
  $('pageR').style.cssText=`width:${cvR.width}px;height:${cvR.height}px`;
  $('prevP').disabled=curSpread<=1;
  $('nextP').disabled=curSpread+1>=totalPg;
  const r2=right||curSpread;
  $('pinfo').textContent=(curSpread===r2?''+curSpread:curSpread+'-'+r2)+' / '+totalPg;
  $('pfill').style.width=(totalPg>1?(curSpread-1)/(totalPg-1)*100:100)+'%';
}
async function openBook(id,pdfPath){
  if(!pdfPath){toast('Không tìm thấy file PDF');return}
  const url=pdfPublicUrl(pdfPath);
  $('reader').classList.remove('h');
  const book=books.find(b=>b.id===id);
  $('rtitle').textContent=book?book.title:'';
  $('spread').classList.add('h');
  $('rload').style.display='block';
  $('rload').textContent='Đang tải PDF...';
  pdfDoc=null;curSpread=1;zoom=1.0;$('zpct').textContent='100%';
  try{
    pdfDoc=await pdfjsLib.getDocument(url).promise;
    totalPg=pdfDoc.numPages;
    $('rload').style.display='none';
    $('spread').classList.remove('h');
    await showSpread(1);
  }catch(err){
    $('rload').textContent='Lỗi tải PDF: '+err.message;
    console.error(err);
  }
}
$('rClose').onclick=()=>{$('reader').classList.add('h');pdfDoc=null};
$('prevP').onclick=async()=>{if(!busy&&curSpread>1){busy=true;await showSpread(Math.max(1,curSpread-2));busy=false}};
$('nextP').onclick=async()=>{if(!busy&&curSpread+1<totalPg){busy=true;await showSpread(Math.min(totalPg,curSpread+2));busy=false}};
$('pageL').onclick=async()=>{if(!busy&&curSpread>1){busy=true;await showSpread(Math.max(1,curSpread-2));busy=false}};
$('pageR').onclick=async()=>{if(!busy&&curSpread+1<totalPg){busy=true;await showSpread(Math.min(totalPg,curSpread+2));busy=false}};
$('pbar').onclick=async e=>{if(!pdfDoc)return;const r=e.currentTarget.getBoundingClientRect();let p=Math.round(1+(e.clientX-r.left)/r.width*(totalPg-1));if(p%2===0)p=Math.max(1,p-1);await showSpread(p)};
$('zIn').onclick=async()=>{if(zoom<3){zoom=+(zoom+.25).toFixed(2);$('zpct').textContent=Math.round(zoom*100)+'%';await showSpread(curSpread)}};
$('zOut').onclick=async()=>{if(zoom>.4){zoom=+(zoom-.25).toFixed(2);$('zpct').textContent=Math.round(zoom*100)+'%';await showSpread(curSpread)}};
let rszT;window.addEventListener('resize',()=>{clearTimeout(rszT);rszT=setTimeout(()=>{if(pdfDoc)showSpread(curSpread)},300)});
document.addEventListener('keydown',async e=>{
  if($('reader').classList.contains('h'))return;
  if(e.key==='Escape'){$('rClose').click();return}
  if((e.key==='ArrowRight'||e.key==='PageDown')&&!busy&&curSpread+1<totalPg){busy=true;await showSpread(Math.min(totalPg,curSpread+2));busy=false}
  if((e.key==='ArrowLeft'||e.key==='PageUp')&&!busy&&curSpread>1){busy=true;await showSpread(Math.max(1,curSpread-2));busy=false}
});

// ── FILTERS ─────────────────────────────────────────────
document.querySelectorAll('.pill').forEach(p=>{
  p.onclick=()=>{document.querySelectorAll('.pill').forEach(x=>x.classList.remove('on'));p.classList.add('on');filterCat=p.dataset.cat;render()};
});
let qt;$('q').addEventListener('input',e=>{clearTimeout(qt);qt=setTimeout(()=>{qry=e.target.value.trim();render()},200)});

// ── INIT ─────────────────────────────────────────────────
loadBooks();
</script>
